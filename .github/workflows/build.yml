name: build-azerothcore-llm
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      BOOST_ROOT: C:\local\boost_1_82_0
    steps:
      - name: Enable long paths
        shell: powershell
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --global core.longpaths true

      - name: Checkout AzerothCore
        uses: actions/checkout@v4
        with:
          repository: mod-playerbots/azerothcore-wotlk
          ref: Playerbot
          path: a

      - name: Checkout mod-playerbots
        uses: actions/checkout@v4
        with:
          repository: mod-playerbots/mod-playerbots
          path: a/modules/mod-playerbots

      - name: Checkout mod-llm-chatter
        uses: actions/checkout@v4
        with:
          repository: Hokken/mod-llm-chatter
          path: a/modules/mod-llm-chatter

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.13

      - name: Install dependencies
        shell: bash
        working-directory: a
        env:
          CONTINUOUS_INTEGRATION: true
        run: |
          ./acore.sh install-deps

      - name: Build
        shell: bash
        working-directory: a
        run: |
          export CTOOLS_BUILD=all
          ./acore.sh compiler build

      - name: Find build output
        shell: bash
        working-directory: a
        run: |
          find var/build -name "*.exe" -o -name "*.dll" 2>/dev/null | head -20
          find env/dist -name "*.exe" -o -name "*.dll" 2>/dev/null | head -20
          ls -la var/build/bin/RelWithDebInfo/ 2>/dev/null || echo "No RelWithDebInfo"
          ls -la env/dist/bin/ 2>/dev/null || echo "No env/dist/bin"

      - name: Copy binaries to dist
        shell: bash
        working-directory: a
        run: |
          mkdir -p dist/bin
          cp var/build/bin/RelWithDebInfo/*.exe dist/bin/ 2>/dev/null || true
          cp var/build/bin/RelWithDebInfo/*.dll dist/bin/ 2>/dev/null || true
          cp env/dist/bin/*.exe dist/bin/ 2>/dev/null || true
          cp env/dist/bin/*.dll dist/bin/ 2>/dev/null || true
          cp -r env/dist/etc dist/ 2>/dev/null || true
          cp -r modules/mod-llm-chatter/tools dist/llm-chatter-bridge 2>/dev/null || true
          ls -la dist/bin/

      - name: Upload server binaries
        uses: actions/upload-artifact@v4
        with:
          name: azerothcore-llm-chatter
          path: a/dist/
          retention-days: 30
